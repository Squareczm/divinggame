<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>深潜模拟器 · 潜水员之路</title>
<meta name="description" content="从 Open Water 到世界级潜水员的像素风模拟游戏。下潜、挂钩、救援、沉船、微距。每一次呼吸都是修为。">
<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>

<div class="machine">
  <div class="machine-label">OCEANLOG DC-2026</div>
  <div class="machine-sublabel">CN &middot; CYAN DIVE COMPUTER &middot; BLUE ENGINE v1</div>

  <div class="screen-bezel">
    <div class="screen" id="screen">
      <div class="bubbles" id="bubbles"></div>
      <div id="screen-content"></div>
    </div>
  </div>

  <div class="controls">
    <div class="dpad">
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('up')">&#9650;</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('left')">&#9664;</div>
      <div class="dpad-btn ok" onclick="handleInput('ok')">OK</div>
      <div class="dpad-btn" onclick="handleInput('right')">&#9654;</div>
      <div class="dpad-btn empty"></div>
      <div class="dpad-btn" onclick="handleInput('down')">&#9660;</div>
      <div class="dpad-btn empty"></div>
    </div>
    <div class="ab-buttons">
      <div>
        <div class="ab-btn btn-a" onclick="handleInput('a')">A</div>
        <div class="btn-label" id="btn-a-label">A 确认</div>
      </div>
      <div>
        <div class="ab-btn btn-b" onclick="handleInput('b')">B</div>
        <div class="btn-label" id="btn-b-label">B 返回</div>
      </div>
    </div>
  </div>

  <div class="footer-info">v2.0 &middot; 水下有风险 &middot; 慢下去慢上来</div>
</div>

<script src="content.js"></script>
<script src="game.js"></script>
</body>
</html>
