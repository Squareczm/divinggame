<style>

@font-face {
  font-family: 'Zpix';

  font-display: swap;
}

* {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-font-smoothing: none;
  -moz-osx-font-smoothing: grayscale;
  image-rendering: pixelated;
}

html, body { height: 100%; overflow: hidden; }

body {
  background: #041025;
  background-image:
    linear-gradient(90deg, rgba(80,200,255,0.03) 1px, transparent 1px),
    linear-gradient(0deg, rgba(80,200,255,0.03) 1px, transparent 1px);
  background-size: 8px 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Zpix', 'Press Start 2P', 'VT323', monospace;
  color: #7ff7ff;
  padding: 8px 0;
}

.machine {
  width: 500px;
  max-width: 96vw;
  height: calc(100vh - 20px);
  max-height: 840px;
  background: #162838;
  padding: 14px 18px 16px;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 2px #2a4760,
    0 0 0 6px #061423,
    0 0 0 8px #2a4760,
    0 0 0 12px #061423,
    8px 8px 0 0 rgba(0,0,0,0.5);
}

.machine-label {
  text-align: center;
  color: #3ea8c7;
  font-family: 'Press Start 2P', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  margin-bottom: 4px;
  text-transform: uppercase;
  flex: 0 0 auto;
}

.machine-sublabel {
  text-align: center;
  color: #2a5a7a;
  font-family: 'Press Start 2P', monospace;
  font-size: 6px;
  letter-spacing: 2px;
  margin-bottom: 10px;
  flex: 0 0 auto;
}

.screen-bezel {
  background: #030a15;
  padding: 8px;
  margin-bottom: 12px;
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  box-shadow:
    inset 0 0 0 2px #000,
    0 0 0 2px #2a4760;
}

.screen {
  background: linear-gradient(180deg, #02111f 0%, #030a18 40%, #010509 100%);
  padding: 12px 14px;
  flex: 1 1 auto;
  width: 100%;
  min-height: 0;
  overflow: hidden;
  position: relative;
  color: #7ff7ff;
  font-family: 'Zpix', 'VT323', monospace;
  font-size: 14px;
  line-height: 1.55;
}

@media (max-width: 420px) {
  .screen { padding: 10px 12px; font-size: 13px; }
}

@media (max-height: 640px) {
  .screen { font-size: 12px; line-height: 1.45; }
  .machine-sublabel { display: none; }
}

.screen::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.28) 0px,
    rgba(0,0,0,0.28) 1px,
    transparent 1px,
    transparent 3px
  );
  pointer-events: none;
  z-index: 1;
}

.screen::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
  pointer-events: none;
  z-index: 2;
}

.screen > * { position: relative; z-index: 3; }

.stats-bar {
  display: flex;
  justify-content: space-between;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 9px;
  color: #3ea8c7;
  border-bottom: 2px dotted #1c5a72;
  padding-bottom: 6px;
  margin-bottom: 6px;
  letter-spacing: 1px;
}

.dive-hud {
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 9px;
  color: #6fd0e8;
  border-bottom: 1px dashed #1c5a72;
  padding: 4px 0 5px;
  margin-bottom: 6px;
  letter-spacing: 1px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px 10px;
}

.dive-hud .label { color: #2a7d96; }
.dive-hud .val { color: #7ff7ff; }
.dive-hud .danger { color: #ff7a6a; animation: blink 0.7s steps(2) infinite; }
.dive-hud .warn { color: #ffcc55; }
.dive-hud .good { color: #66ffaa; }

.bar {
  display: inline-block;
  font-family: monospace;
  letter-spacing: -1px;
}

.title-art {
  text-align: center;
  margin: 10px 0 6px;
  font-size: 13px;
  line-height: 1.5;
  color: #7ff7ff;
}

.title-art .big {
  font-size: 22px;
  letter-spacing: 6px;
  margin: 10px 0;
  color: #a7f5ff;
  text-shadow:
    2px 0 0 #0a5a78,
    0 2px 0 #0a5a78,
    2px 2px 0 #0a5a78;
}

.title-art svg { display: block; margin: 0 auto; }

.scene-title {
  text-align: center;
  margin: 3px 0;
  font-size: 13px;
  color: #3ea8c7;
}

.scene-flavor {
  text-align: center;
  font-size: 12px;
  color: #2a7d96;
  margin-bottom: 5px;
}

.narrative {
  margin: 5px 0 6px;
  font-size: 13px;
  line-height: 1.55;
}

.divider {
  text-align: center;
  color: #1c5a7240;
  margin: 3px 0;
  font-size: 11px;
  letter-spacing: 2px;
}

.choice {
  margin: 3px 0;
  font-size: 13px;
  cursor: pointer;
  padding: 3px 5px;
  line-height: 1.4;
  color: #7ff7ff;
}

.choice:hover, .choice.selected {
  color: #02111f;
  background: #7ff7ff;
  text-shadow: none;
}

.choice .key {
  display: inline-block;
  width: 20px;
  color: inherit;
}

.choice .tag {
  display: inline;
  font-size: 10px;
  color: #2a7d96;
  margin-left: 8px;
  white-space: nowrap;
}

.choice.selected .tag { color: #003344; }

.result-text {
  margin: 5px 0;
  font-size: 13px;
  line-height: 1.55;
}

.result-text .gain { color: #66ffaa; }
.result-text .lose { color: #ff7a6a; }
.result-text .event { color: #6fd0e8; }
.result-text .item { color: #ee88ff; }
.result-text .reckless { color: #ffcc55; }

.prompt {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 9px;
  color: #2a7d96;
  margin-top: 8px;
  letter-spacing: 1px;
  animation: blink 1s steps(2) infinite;
}

@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}

.controls {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 8px;
  flex: 0 0 auto;
}

.dpad {
  display: grid;
  grid-template-columns: 36px 36px 36px;
  grid-template-rows: 36px 36px 36px;
  gap: 0;
}

.dpad-btn {
  width: 36px;
  height: 36px;
  background: #0a1a28;
  border: 0;
  color: #7ff7ff;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  box-shadow:
    inset 2px 2px 0 0 #2a4760,
    inset -2px -2px 0 0 #000;
}

.dpad-btn:active {
  background: #050e18;
  box-shadow:
    inset -2px -2px 0 0 #2a4760,
    inset 2px 2px 0 0 #000;
}

.dpad-btn.empty { background: transparent; box-shadow: none; visibility: hidden; }
.dpad-btn.ok { font-family: 'Press Start 2P', monospace; font-size: 9px; letter-spacing: 1px; color: #a7f5ff; }

.ab-buttons {
  display: flex;
  flex-direction: column;
  gap: 8px;
  align-items: center;
}

.ab-btn {
  width: 46px;
  height: 46px;
  border: 0;
  font-family: 'Press Start 2P', monospace;
  font-size: 16px;
  color: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  -webkit-tap-highlight-color: transparent;
  clip-path: polygon(
    25% 0%, 75% 0%,
    100% 25%, 100% 75%,
    75% 100%, 25% 100%,
    0% 75%, 0% 25%
  );
}

.ab-btn:active { transform: translate(1px, 1px); }

.ab-btn.btn-a {
  background: #1a7ea5;
  color: #fff;
  box-shadow: inset 0 -6px 0 0 #0a3b52;
}

.ab-btn.btn-b {
  background: #2a3e6a;
  color: #fff;
  box-shadow: inset 0 -6px 0 0 #121a33;

.btn-label {
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 7px;
  color: #3a5a7a;
  text-align: center;
  margin-top: 4px;
  letter-spacing: 1px;

.footer-info {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;

@keyframes pixelblink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0.4; }

.battle-stats {
  font-size: 12px;
  margin: 8px 0;
  line-height: 1.6;
  color: #3ea8c7;

.ending-title {
  text-align: center;
  font-family: 'Press Start 2P', 'Zpix', monospace;
  font-size: 15px;
  margin: 8px 0 6px;
  letter-spacing: 3px;
  color: #a7f5ff;
  text-shadow:
    2px 0 0 #0a5a78,
    0 2px 0 #0a5a78,
    2px 2px 0 #0a5a78;

.ending-summary {
  font-size: 12px;
  line-height: 1.55;
  margin: 6px 0;

.items-list {
  font-size: 11px;
  color: #ee88ff;
  margin: 6px 0;
  line-height: 1.6;
}

.pixel-art {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 4px 0 6px;
  min-height: 40px;
}

.pixel-art svg {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}

.bubbles {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.bubble {
  position: absolute;
  width: 4px; height: 4px;
  background: rgba(127, 247, 255, 0.35);
  border-radius: 50%;
  animation: rise linear infinite;
}

@keyframes rise {
  0% { bottom: -10px; opacity: 0; }
  15% { opacity: 0.8; }
  85% { opacity: 0.6; }
  100% { bottom: 110%; opacity: 0; }
}

.wave-line {
  color: #1c5a72;
  font-family: monospace;
  text-align: center;
  font-size: 10px;
  letter-spacing: 0;
}
</style>
</head>

function drawPixel(key) {
  if (!PIXELS[key]) return '';
  return `<div class="pixel-art">${PIXELS[key]}</div>`;
}

function seedBubbles(n) {
  const box = document.getElementById('bubbles');
  if (!box) return;
  box.innerHTML = '';
  for (let i = 0; i < n; i++) {
    const b = document.createElement('div');
    b.className = 'bubble';
    b.style.left = (Math.random() * 98) + '%';
    b.style.animationDuration = (5 + Math.random() * 8) + 's';
    b.style.animationDelay = (Math.random() * 8) + 's';
    b.style.width = (2 + Math.random() * 4) + 'px';
    b.style.height = b.style.width;
    box.appendChild(b);
  }
}

function rollSite() {
  const s = SITES[Math.floor(Math.random() * SITES.length)];
  const d = Math.round(s.depth[0] + Math.random() * (s.depth[1] - s.depth[0]));
  const t = Math.round(s.temp[0] + Math.random() * (s.temp[1] - s.temp[0]));
  return {
    site: s.name,
    flavor: s.flavor,
    depth: d,
    gas: 200,
    ndl: Math.max(5, Math.round(80 - d * 1.8)),
    temp: t,
    buddy: 'OK',
  };
}

// ==================== 引擎 ====================

function applyArchetypeMods() {
  const a = ARCHETYPES[state.archetype];
  if (!a) return;
  const m = a.startMods || {};
  Object.keys(m).forEach(k => { state[k] = (state[k] || 0) + m[k]; });
}

function nextCert() {
  if (state.cert < CERTS.length - 1) {
    const next = CERTS[state.cert + 1];
    if (state.exp >= next.exp) return true;
  }
  return false;
}

function checkEnding() {
  if (state.hp <= 0) return 'burnout';
  if (state.reckless >= 100) return 'reckless';
  if (state.flags.shop_owner && state.money >= 150 && state.exp >= 400) return 'founder';
  if (state.money >= 250) return 'rich';
  if (state.cert >= CERTS.length - 1 && state.exp >= 1800) return 'ascend';
  if (state.flags.has_pro_cam && state.flags.advocate === undefined && state.exp >= 600 && state.money >= 150) return 'photographer';
  if (state.flags.advocate && state.flags.conservationist && state.connections >= 80) return 'conservationist';
  if (state.flags.mentor_legacy && state.connections >= 90) return 'teacher';
  if (state.day >= 180 && state.hp >= 80 && state.connections >= 50 && state.reckless < 40) return 'sage';
  if (state.day >= 260) return 'exile';
  return null;
}

function eventAvailable(e) {
  if (state.seenEvents.includes(e.id) && state.seenEvents.length < EVENTS.length * 0.7) return false;
  if (e.cert) {
    if (e.cert.min !== undefined && state.cert < e.cert.min) return false;
    if (e.cert.max !== undefined && state.cert > e.cert.max) return false;
  }
  if (e.requires) {
    for (const flag of e.requires) if (!state.flags[flag]) return false;
  }
  return true;
}

function shuffleArr(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function withShuffledChoices(e) {
  return Object.assign({}, e, { choices: shuffleArr(e.choices) });
}

function pickEvent() {
  if (state.queuedEvents.length > 0) {
    const id = state.queuedEvents.shift();
    const e = EVENTS.find(x => x.id === id);
    if (e) return withShuffledChoices(e);
  }
  const available = EVENTS.filter(eventAvailable);
  const base = available.length === 0
    ? EVENTS[Math.floor(Math.random() * EVENTS.length)]
    : available[Math.floor(Math.random() * available.length)];
  return withShuffledChoices(base);
}

function pickExam() {
  const idx = Math.min(state.cert, CERT_EXAMS.length - 1);
  return CERT_EXAMS[idx];
}

function getMult(key, fallback = 1) {
  const a = ARCHETYPES[state.archetype];
  if (!a) return fallback;
  if (key === 'exp' && a.expMult) return a.expMult;
  if (key === 'hp' && a.hpMult) return a.hpMult;
  if (key === 'money' && a.moneyMult) return a.moneyMult;
  return fallback;
}

function applyEffects(effects) {
  const lines = [];
  if (effects.exp) {
    const v = effects.exp > 0 ? Math.round(effects.exp * getMult('exp')) : effects.exp;
    state.exp = Math.max(0, state.exp + v);
    lines.push(v > 0 ? `<span class="gain">潜龄 +${v}</span>` : `<span class="lose">潜龄 ${v}</span>`);
  }
  if (effects.hp) {
    const v = effects.hp > 0 ? Math.round(effects.hp * getMult('hp')) : effects.hp;
    state.hp = Math.min(state.maxHp, Math.max(0, state.hp + v));
    lines.push(v > 0 ? `<span class="gain">精力 +${v}</span>` : `<span class="lose">精力 ${v}</span>`);
  }
  if (effects.money) {
    const v = effects.money > 0 ? Math.round(effects.money * getMult('money')) : effects.money;
    state.money = Math.max(0, state.money + v);
    lines.push(v > 0 ? `<span class="gain">储蓄 +${v}</span>` : `<span class="lose">储蓄 ${v}</span>`);
  }
  if (effects.connections) {
    state.connections = Math.max(0, state.connections + effects.connections);
    lines.push(effects.connections > 0 ? `<span class="gain">口碑 +${effects.connections}</span>` : `<span class="lose">口碑 ${effects.connections}</span>`);
  }
  if (effects.reckless) {
    state.reckless += effects.reckless;
    lines.push(`<span class="reckless">鲁莽 +${effects.reckless}</span>`);
  }
  return lines.join('  ');
}

// ==================== 渲染 ====================

function renderStats() {
  return `<div class="stats-bar">
    <span>HP ${state.hp}/${state.maxHp}</span>
    <span>潜龄 ${state.exp}</span>
    <span>$ ${state.money}</span>
    <span>口碑 ${state.connections}</span>
  </div>`;
}

function renderDiveHUD() {
  const d = state.divCtx;
  const gasClass = d.gas < 50 ? 'danger' : d.gas < 100 ? 'warn' : 'good';
  const ndlClass = d.ndl < 5 ? 'danger' : d.ndl < 15 ? 'warn' : 'good';
  const depthClass = d.depth >= 30 ? 'warn' : '';
  const gasBar = renderBar(d.gas, 200, 8);
  return `<div class="dive-hud">
    <span><span class="label">D</span> <span class="val ${depthClass}">${d.depth}m</span></span>
    <span><span class="label">BT</span> <span class="val">${String(Math.floor(state.day/10)).padStart(2,'0')}:${String((state.day*7)%60).padStart(2,'0')}</span></span>
    <span><span class="label">GAS</span> <span class="val ${gasClass}">${gasBar} ${d.gas}bar</span></span>
    <span><span class="label">NDL</span> <span class="val ${ndlClass}">${d.ndl}m</span></span>
    <span><span class="label">TEMP</span> <span class="val">${d.temp}&#176;C</span></span>
    <span><span class="label">BUD</span> <span class="val good">${d.buddy}</span></span>
  </div>`;
}

function renderBar(val, max, width) {
  const filled = Math.max(0, Math.min(width, Math.round((val / max) * width)));
  return '[' + '#'.repeat(filled) + '.'.repeat(width - filled) + ']';
}

function renderTitle() {
  return `

  const t = state.currentEvent;

  html += `<div class="narrative">${t.text}</div>`;

  if (state.phase === 'choose') {
    const rate = calcExamSuccess(t);
    const level = rate >= 0.75 ? '胜券在握' : rate >= 0.55 ? '七成把握' : rate >= 0.35 ? '胜负参半' : rate >= 0.2 ? '凶多吉少' : '九死一生';
    html += `<div class="battle-stats">心境自评: <span style="color:#a7f5ff">${level}</span></div>`;
    html += `<div class="choice ${state.selectedChoice === 0 ? 'selected' : ''}" onclick="selectChoice(0)"><span class="key">${state.selectedChoice === 0 ? '&#9654; ' : '  '}</span>A. 上考场</div>`;
    html += `<div class="choice ${state.selectedChoice === 1 ? 'selected' : ''}" onclick="selectChoice(1)"><span class="key">${state.selectedChoice === 1 ? '&#9654; ' : '  '}</span>B. 暂缓，多沉淀几潜</div>`;
    html += `<div class="prompt">[ 选择你的节奏 ]</div>`;
  } else {
    html += `<div class="result-text">${state.resultText}</div>`;
    if (state.phase === 'cert_up') {
      const nc = CERTS[state.cert];
      html += `<div class="cert-up">*** 升证！${nc.name}（${nc.title}）***</div>`;
    }
    html += `<div class="prompt">[ 按 A 继续 ]</div>`;
  }
  return html;
}

function calcExamSuccess(t) {
  const nextExp = CERTS[state.cert + 1]?.exp || 2500;
  const base = (state.exp / nextExp) * 0.5;
  const connBonus = state.connections * 0.003;
  const hpBonus = (state.hp / state.maxHp) * 0.15;
  const recklessPenalty = state.reckless * 0.002;
  const flagBonus =
    (state.flags.rescued_diver ? 0.05 : 0) +
    (state.flags.saved_life ? 0.05 : 0) +
    (state.flags.good_dm ? 0.04 : 0) +
    (state.flags.kept_calm ? 0.03 : 0) +
    (state.flags.crisis_leader ? 0.05 : 0);
  return Math.max(0.15, Math.min(0.95, base + connBonus + hpBonus - recklessPenalty + flagBonus));
}

function render() {
  const screen = document.getElementById('screen-content');
  let html = '';
  switch (state.screen) {
    case 'title':     html = renderTitle(); break;
    case 'name':      html = renderNameInput(); break;
    case 'archetype': html = renderArchetype(); break;
    case 'event':     html = renderEvent(); break;
    case 'exam':      html = renderExam(); break;
    case 'ending':    html = renderEnding(); break;
  }
  screen.innerHTML = html;
  screen.scrollTop = 0;
}

function selectChoice(i) {
  if (state.phase !== 'choose') return;
  state.selectedChoice = i;
  render();
}

function selectArchetype(i) {
  state.menuIndex = i;
  render();
}

function pickName(n) {
  state.username = n;
  render();
}

function goToName() {
  state.screen = 'name';
  state.username = state.username || '';
  state.menuIndex = 0;
  render();
}

function goToArchetype() {
  if (!state.username || state.username.trim().length === 0) {
    state.username = '匿名潜水员';
  }
  state.username = state.username.slice(0, 10).trim();
  state.screen = 'archetype';
  state.menuIndex = 0;
  render();
}

function startGame() {
  const ids = Object.keys(ARCHETYPES);
  const archetype = ids[state.menuIndex];
  const name = state.username;
  Object.assign(state, {
    screen: 'event',
    archetype,
    username: name,
    hp: 100, maxHp: 100,
    exp: 0, money: 0,
    connections: 0, reckless: 0,
    cert: 0, day: 0,
    seenEvents: [], queuedEvents: [],
    items: [], flags: {},
    currentEvent: null,
    selectedChoice: 0, menuIndex: 0, phase: 'choose',
    resultText: '', ending: null, totalChoices: 0,
    divCtx: rollSite(),
  });
  applyArchetypeMods();
  nextDive();
}

function nextDive() {
  state.day++;
  // 每3-5潜换一次潜点
  if (state.day === 1 || Math.random() < 0.25) {
    state.divCtx = rollSite();
  } else {
    // 小幅度调整深度/气量
    state.divCtx.gas = Math.max(60, Math.round(180 + (Math.random() - 0.5) * 40));
    state.divCtx.ndl = Math.max(3, Math.round(state.divCtx.ndl + (Math.random() - 0.3) * 6));
  }

  const ending = checkEnding();
  if (ending) {
    state.ending = ending;
    state.screen = 'ending';
    render();
    return;
  }

  if (nextCert() && state.day > 3) {
    const t = pickExam();
    state.currentEvent = t;
    state.screen = 'exam';
    state.phase = 'choose';
    state.selectedChoice = 0;
    render();
    return;
  }

  const e = pickEvent();
  state.currentEvent = e;
  if (!state.seenEvents.includes(e.id)) state.seenEvents.push(e.id);
  state.screen = 'event';
  state.phase = 'choose';
  state.selectedChoice = 0;
  render();
}

function confirmChoice() {
  if (state.screen === 'title')     { goToName(); return; }
  if (state.screen === 'name')      { goToArchetype(); return; }
  if (state.screen === 'archetype') { startGame(); return; }
  if (state.screen === 'ending')    { resetGame(); return; }

  if (state.phase !== 'choose') {
    nextDive();
    return;
  }

  state.totalChoices++;
  const e = state.currentEvent;

  if (state.screen === 'exam') {
    const successRate = calcExamSuccess(e);
    if (state.selectedChoice === 0) {
      if (Math.random() < successRate) {
        state.cert++;
        state.maxHp += 20;
        state.hp = Math.min(state.maxHp, state.hp + 30);
        state.resultText = `<span class="gain">${e.successText}</span>`;
        state.phase = 'cert_up';
      } else {
        state.hp = Math.max(0, state.hp - 20);
        state.exp = Math.max(0, state.exp - 30);
        state.resultText = `<span class="lose">${e.failText}</span>`;
        state.phase = 'result';
      }
    } else {
      state.resultText = '你选择先打磨自己，等更好的时机。';
      state.phase = 'result';
    }
    render();
    return;
  }

  const c = e.choices[state.selectedChoice];
  state.resultText = applyEffects(c.effects);
  if (c.item) state.items.push(c.item);
  if (c.flag) state.flags[c.flag] = true;
  if (c.next) state.queuedEvents.push(c.next);

  state.phase = 'result';
  render();
}

function resetGame() {
  const keepName = state.username;
  Object.assign(state, {
    screen: 'title',
    archetype: null,
    hp: 100, maxHp: 100,
    exp: 0, money: 0,
    connections: 0, reckless: 0,
    cert: 0, day: 1,
    seenEvents: [], queuedEvents: [],
    items: [], flags: {},
    currentEvent: null, selectedChoice: 0, menuIndex: 0,
    phase: 'choose', resultText: '', ending: null, totalChoices: 0,
    divCtx: { site: '诗巴丹 Sipadan', depth: 18, gas: 180, ndl: 35, temp: 27, buddy: 'OK' },
    username: keepName,
  });
  render();
}

function handleInput(key) {
  if (state.screen === 'name') {
    if (key === 'a' || key === 'ok') { goToArchetype(); return; }
    return;
  }
  switch (key) {
    case 'a':
    case 'ok':
      if (state.screen === 'title')     { goToName(); return; }
      if (state.screen === 'archetype') { startGame(); return; }
      confirmChoice();
      break;
    case 'b':
      if (state.screen === 'archetype') { state.screen = 'name'; render(); }
      else if (state.screen === 'name') { state.screen = 'title'; render(); }
      break;
    case 'up':
    case 'left':
      if (state.screen === 'archetype') {
        state.menuIndex = Math.max(0, state.menuIndex - 1);
        render();
      } else if (state.phase === 'choose') {
        state.selectedChoice = Math.max(0, state.selectedChoice - 1);
        render();
      }
      break;
    case 'down':
    case 'right':
      if (state.screen === 'archetype') {
        const max = Object.keys(ARCHETYPES).length - 1;
        state.menuIndex = Math.min(max, state.menuIndex + 1);
        render();
      } else if (state.phase === 'choose' && state.currentEvent) {
        const max = state.screen === 'exam' ? 1 : (state.currentEvent.choices?.length || 2) - 1;
        state.selectedChoice = Math.min(max, state.selectedChoice + 1);
        render();
      }
      break;
  }
}

// ==================== 键盘事件 ====================
document.addEventListener('keydown', (e) => {
  if (state.screen === 'name') {
    if (e.key === 'Enter') { goToArchetype(); e.preventDefault(); return; }
    if (e.key === 'Backspace') {
      state.username = (state.username || '').slice(0, -1);
      render();
      e.preventDefault();
      return;
    }
    if (e.key === 'Escape') { state.screen = 'title'; render(); e.preventDefault(); return; }
    if (e.key.length === 1 && /[\u4e00-\u9fa5A-Za-z0-9 ._-]/.test(e.key)) {
      state.username = ((state.username || '') + e.key).slice(0, 10);
      render();
      e.preventDefault();
    }
    return;
  }
  switch (e.key) {
    case 'ArrowUp': case 'w': handleInput('up'); break;
    case 'ArrowDown': case 's': handleInput('down'); break;
    case 'ArrowLeft': handleInput('left'); break;
    case 'ArrowRight': handleInput('right'); break;
    case 'Enter': case ' ': case 'j': handleInput('a'); break;
    case 'Escape': case 'k': handleInput('b'); break;
    default: return;
  }
  e.preventDefault();
});

// ==================== 结算战绩图（Canvas 渲染） ====================

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

function svgToDataUrl(svg) {
  return 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(svg)));
}

async function generateShareCard() {
  const btn = document.getElementById('share-btn');
  if (btn) { btn.textContent = '生成中...'; btn.disabled = true; }

  try {
    const W = 750, H = 1150;
    const canvas = document.createElement('canvas');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    // 背景渐变（深海）
    const bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#05223a');
    bg.addColorStop(0.5, '#02111f');
    bg.addColorStop(1, '#010509');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // 网格背景（潜水电脑 vibe）
    ctx.strokeStyle = 'rgba(80,200,255,0.06)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 16) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 16) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // 像素边框（仿GBA机身）
    function pxFrame(x, y, w, h, c1, c2) {
      ctx.fillStyle = c1; ctx.fillRect(x, y, w, 4); ctx.fillRect(x, y, 4, h);
                        ctx.fillRect(x + w - 4, y, 4, h); ctx.fillRect(x, y + h - 4, w, 4);
      ctx.fillStyle = c2;
      ctx.fillRect(x + 4, y + 4, w - 8, 2); ctx.fillRect(x + 4, y + 4, 2, h - 8);
      ctx.fillRect(x + w - 6, y + 4, 2, h - 8); ctx.fillRect(x + 4, y + h - 6, w - 8, 2);
    }
    pxFrame(20, 20, W - 40, H - 40, '#3ea8c7', '#0a3b52');
    pxFrame(36, 36, W - 72, H - 72, '#1c5a72', '#000');

    // 顶部标签
    ctx.fillStyle = '#3ea8c7';
    ctx.font = 'bold 18px "Courier New", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('OCEANLOG DC-2026  ·  DIVER CARD', W / 2, 78);

    ctx.fillStyle = '#2a7d96';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillText('CN  ·  CYAN DIVE COMPUTER  ·  v1', W / 2, 100);

    // 标题
    ctx.fillStyle = '#a7f5ff';
    ctx.font = 'bold 56px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.fillText('深 潜 模 拟 器', W / 2, 170);

    ctx.fillStyle = '#6fd0e8';
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('DEEP DIVER SIMULATOR', W / 2, 198);

    // 潜水员像素图（中间）
    const diverSvg = PIXELS.diver.replace('width="44"', 'width="176"').replace('height="48"', 'height="192"');
    try {
      const diverImg = await loadImage(svgToDataUrl(diverSvg));
      ctx.drawImage(diverImg, W/2 - 88, 220, 176, 192);
    } catch (e) {}

    // 结局横幅
    const ending = ENDINGS[state.ending];
    ctx.fillStyle = '#a7f5ff';
    ctx.font = 'bold 48px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(ending.title, W / 2, 460);

    ctx.fillStyle = '#6fd0e8';
    ctx.font = '18px "SimHei", "Microsoft YaHei", sans-serif';
    const sub = ending.subtitle.replace(/&middot;/g, '·');
    ctx.fillText(sub, W / 2, 492);

    // 分隔线
    ctx.fillStyle = '#1c5a72';
    for (let x = 80; x < W - 80; x += 14) ctx.fillRect(x, 510, 6, 2);

    // 潜水员姓名
    ctx.fillStyle = '#ffcc55';
    ctx.font = 'bold 32px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.fillText('DIVER: ' + (state.username || '匿名潜水员'), W / 2, 550);

    // 核心数据 (2x3 网格)
    const stats = [
      ['证 书', CERTS[state.cert].name],
      ['流 派', ARCHETYPES[state.archetype].name],
      ['潜 次', state.day + ' 次'],
      ['潜 龄', state.exp + ' XP'],
      ['口 碑', state.connections],
      ['储 蓄', '$' + state.money],
    ];
    const statStartY = 580;
    stats.forEach((s, i) => {
      const col = i % 2, row = Math.floor(i / 2);
      const x = 110 + col * 280;
      const y = statStartY + row * 70;
      // 框
      ctx.fillStyle = 'rgba(62, 168, 199, 0.08)';
      ctx.fillRect(x - 10, y - 8, 250, 58);
      ctx.strokeStyle = '#1c5a72';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - 10, y - 8, 250, 58);
      // label
      ctx.fillStyle = '#2a7d96';
      ctx.font = 'bold 13px "SimHei", "Microsoft YaHei", sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(s[0], x, y + 10);
      // val
      ctx.fillStyle = '#7ff7ff';
      ctx.font = 'bold 22px "SimHei", "Microsoft YaHei", sans-serif';
      ctx.fillText(String(s[1]), x, y + 38);
    });

    // 结局文字（节选）
    const endingSnip = ending.text.length > 70 ? ending.text.slice(0, 68) + '…' : ending.text;
    ctx.fillStyle = '#a7f5ff';
    ctx.font = '16px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    wrapText(ctx, endingSnip, W / 2, 795, W - 120, 24);

    // 底部 QR + 引导
    await drawQrCode(ctx, 48, H - 192, 160);

    ctx.textAlign = 'left';
    ctx.fillStyle = '#a7f5ff';
    ctx.font = 'bold 22px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.fillText('扫码，开始你的潜水之旅', 236, H - 160);

    ctx.fillStyle = '#6fd0e8';
    ctx.font = '16px "Courier New", monospace';
    ctx.fillText('divinggame.ainovalife.com', 236, H - 130);

    ctx.fillStyle = '#2a7d96';
    ctx.font = '13px "SimHei", "Microsoft YaHei", sans-serif';
    ctx.fillText('水下有戏 · 呼吸是节奏 · 敬畏是修为', 236, H - 102);

    // 底部品牌行
    ctx.textAlign = 'center';
    ctx.fillStyle = '#2a4760';
    ctx.font = '12px "Courier New", monospace';
    ctx.fillText('DEEPDIVE.AINOVALIFE.COM  ·  DIVER-CARD v1', W / 2, H - 56);

    // 下载
    const link = document.createElement('a');
    link.download = `deep_diver_${(state.username || 'anon').replace(/\s/g, '_')}_${Date.now()}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (err) {
    console.error(err);
    alert('战绩图生成失败：' + err.message);
  } finally {
    if (btn) { btn.textContent = '下 载 战 绩 图'; btn.disabled = false; }
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const chars = text.split('');
  let line = '';
  let yy = y;
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i];
    if (ctx.measureText(test).width > maxWidth && line.length > 0) {
      ctx.fillText(line, x, yy);
      line = chars[i];
      yy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, yy);
}

// ==================== QR Code 生成（纯实现 · 无外部依赖） ====================
// 最小版 QR code：使用开源 qrcode-generator (CDN 预加载)
async function drawQrCode(ctx, x, y, size) {
  const url = 'https://divinggame.ainovalife.com';
  // 使用 qrcode-generator（CDN）
  if (!window.qrcode) {
    await new Promise((resolve, reject) => {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js';
      script.onload = resolve;
      script.onerror = reject;
      document.head.appendChild(script);
    });
  }
  const qr = window.qrcode(0, 'M');
  qr.addData(url);
  qr.make();
  const count = qr.getModuleCount();
  const cellSize = Math.floor(size / count);
  const realSize = cellSize * count;
  const pad = Math.floor((size - realSize) / 2);
  // 白底
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(x, y, size, size);
  // 绘制二维码
  ctx.fillStyle = '#02111f';
  for (let r = 0; r < count; r++) {
    for (let c = 0; c < count; c++) {
      if (qr.isDark(r, c)) {
        ctx.fillRect(x + pad + c * cellSize, y + pad + r * cellSize, cellSize, cellSize);
      }
    }
  }
}
